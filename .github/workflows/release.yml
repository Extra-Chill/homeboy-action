# Continuous release pipeline for Homeboy Action.
#
# Triggers on push to main (immediate release) and manual dispatch.
# Checks for releasable conventional commits since the last tag. If found:
#   1. Version bump + changelog generation
#   2. Tag + push
#   3. Post-release hook moves the floating v2 tag
#
# No binary builds, no extensions needed — homeboy reads homeboy.json
# directly for version targets and hooks.
#
# No human input needed — version is computed from commit types:
#   fix: → patch, feat: → minor, BREAKING CHANGE → major
#   chore:/ci:/docs:/test: → no release

name: Release

permissions:
  contents: write
  issues: write
  pull-requests: write

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Preview the release without making changes'
        type: boolean
        default: false

jobs:
  # ── Step 1: Check for releasable commits ──
  check:
    name: Check for releasable commits
    runs-on: ubuntu-latest
    outputs:
      should-release: ${{ steps.check.outputs.should-release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore failure cache
        id: failure-cache
        uses: actions/cache/restore@v4
        with:
          path: .release-last-failed
          key: release-last-failed-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            release-last-failed-${{ github.ref_name }}-

      - name: Dry-run release check
        id: release-check
        uses: Extra-Chill/homeboy-action@v2
        with:
          commands: release
          release-dry-run: 'true'

      - name: Decide whether to release
        id: check
        run: |
          HEAD_SHA="$(git rev-parse HEAD)"
          if [ -f .release-last-failed ]; then
            LAST_FAILED="$(tr -d '[:space:]' < .release-last-failed)"
            if [ "${HEAD_SHA}" = "${LAST_FAILED}" ]; then
              echo "::notice::HEAD ${HEAD_SHA:0:8} matches last failed release attempt — skipping until new commits"
              echo "should-release=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          RELEASE_VERSION="${{ steps.release-check.outputs.release-version }}"
          BUMP_TYPE="${{ steps.release-check.outputs.release-bump-type }}"

          if [ -z "${RELEASE_VERSION}" ]; then
            echo "should-release=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No releasable commits at HEAD ${HEAD_SHA:0:8}"
          else
            echo "should-release=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Release dry-run predicts v${RELEASE_VERSION} (${BUMP_TYPE})"
          fi

  # ── Step 2: Release ──
  release:
    name: Release
    needs: check
    if: needs.check.outputs.should-release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        continue-on-error: true
        with:
          app-id: ${{ secrets.HOMEBOY_APP_ID }}
          private-key: ${{ secrets.HOMEBOY_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
          token: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}

      - uses: Extra-Chill/homeboy-action@v2
        id: release
        with:
          commands: release
          release-dry-run: ${{ inputs.dry-run || 'false' }}
          app-token: ${{ steps.app-token.outputs.token || '' }}

  # ── Step 3: Create GitHub Release ──
  # After a successful release, create a GitHub Release from the tag
  # with changelog notes extracted from docs/CHANGELOG.md.
  create-release:
    name: Create GitHub Release
    needs: release
    if: ${{ needs.release.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Get release metadata
        id: meta
        run: |
          # Get the latest semver tag (skip floating tags like v1, v2)
          TAG="$(git tag --sort=-creatordate --list 'v[0-9]*.[0-9]*.[0-9]*' | head -1)"
          if [ -z "${TAG}" ]; then
            echo "::error::No semver tag found on HEAD"
            exit 1
          fi
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Release tag: ${TAG} (version: ${VERSION})"

      - name: Extract changelog section
        id: notes
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          CHANGELOG="docs/CHANGELOG.md"

          if [ ! -f "${CHANGELOG}" ]; then
            echo "body=Release ${VERSION}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Extract the section for this version: from "## [VERSION]" to the next "## ["
          BODY=$(awk -v ver="${VERSION}" '
            /^## \[/ {
              if (found) exit
              if (index($0, "[" ver "]")) found=1
              next
            }
            found { print }
          ' "${CHANGELOG}" | sed '/^$/N;/^\n$/d')

          if [ -z "${BODY}" ]; then
            BODY="Release v${VERSION}"
          fi

          # Write to file to avoid quoting issues
          echo "${BODY}" > /tmp/release-notes.md
          echo "notes-file=/tmp/release-notes.md" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.meta.outputs.tag }}"

          # Skip if release already exists
          if gh release view "${TAG}" > /dev/null 2>&1; then
            echo "Release ${TAG} already exists — skipping"
            exit 0
          fi

          gh release create "${TAG}" \
            --title "${TAG}" \
            --notes-file "${{ steps.notes.outputs.notes-file }}" \
            --verify-tag

  # ── Record failed SHA to prevent retry loops ──
  record-failure:
    name: Record failure
    needs:
      - check
      - release
    if: ${{ always() && needs.check.outputs.should-release == 'true' && needs.release.result == 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Save failed SHA
        run: git rev-parse HEAD > .release-last-failed

      - name: Cache failed SHA
        uses: actions/cache/save@v4
        with:
          path: .release-last-failed
          key: release-last-failed-${{ github.ref_name }}-${{ github.sha }}

  # ── Clear failure cache on success ──
  clear-failure:
    name: Clear failure cache
    needs: release
    if: ${{ needs.release.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Clear failure cache
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh cache list --json id,key --jq '.[] | select(.key | startswith("release-last-failed-${{ github.ref_name }}-")) | .id' | while read -r id; do
            gh cache delete "$id" 2>/dev/null || true
          done
