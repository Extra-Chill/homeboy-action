name: 'Homeboy'
description: 'Convention-driven CI with Homeboy. Reads homeboy.json for project config, infers commands from event context, auto-sets up the environment.'
author: 'Extra Chill'

branding:
  icon: 'check-circle'
  color: 'blue'

inputs:
  # ── Binary acquisition (pick one, or let it download latest) ──
  version:
    description: 'Homeboy version to install (e.g. "0.52.0", "latest"). Ignored when source or binary-path is set.'
    required: false
    default: 'latest'
  source:
    description: 'Path to build homeboy from source (e.g. "."). Falls back to release binary on build failure.'
    required: false
    default: ''
  binary-path:
    description: 'Path to a pre-built homeboy binary. Skips source build and release download.'
    required: false
    default: ''
  rust-toolchain:
    description: 'Rust toolchain for source builds (default: stable).'
    required: false
    default: 'stable'

  # ── Extension ──
  extension:
    description: 'Extension ID override. Auto-inferred from homeboy.json extensions if not set.'
    required: false
    default: ''
  extension-source:
    description: 'Git URL or path to install the extension from.'
    required: false
    default: 'https://github.com/Extra-Chill/homeboy-extensions'

  # ── Commands ──
  commands:
    description: 'Override commands to run. If empty, inferred from event context: PR/push/manual → audit,lint,test; cron → release.'
    required: false
    default: ''
  component:
    description: 'Component name override. Auto-detected from homeboy.json if not set.'
    required: false
    default: ''
  args:
    description: 'Additional arguments to pass to each command.'
    required: false
    default: ''

  # ── Environment setup ──
  auto-setup:
    description: 'Auto-install PHP/Composer/Node dependencies based on extension type. Set false to handle setup yourself.'
    required: false
    default: 'true'
  php-version:
    description: 'PHP version override. Auto-detected from homeboy.json or composer.json if not set.'
    required: false
    default: ''
  node-version:
    description: 'Node.js version override. Auto-detected from homeboy.json or package.json if not set.'
    required: false
    default: ''

  # ── Autofix ──
  autofix:
    description: 'Enable autofix. Set to "true" to enable; disabled by default.'
    required: false
    default: 'false'
  autofix-mode:
    description: 'When to run autofix: "on-failure" (default) or "always" (for baseline auto-ratchet).'
    required: false
    default: 'on-failure'
  autofix-open-pr:
    description: 'Enable non-PR autofix PR creation. Set to "true" to enable; disabled by default.'
    required: false
    default: 'false'
  autofix-max-commits:
    description: 'Maximum autofix commits per branch (loop safety).'
    required: false
    default: '2'
  autofix-commands:
    description: 'Override autofix commands (e.g. "lint --fix,audit --fix --write").'
    required: false
    default: ''
  autofix-label:
    description: 'PR label required to allow autofix.'
    required: false
    default: ''

  # ── GitHub integration ──
  app-token:
    description: 'GitHub App token. Enables auto-issue filing and workflow re-triggers. Generate with actions/create-github-app-token.'
    required: false
    default: ''
  auto-issue:
    description: 'Override auto-issue filing. Default: auto-enabled on non-PR events.'
    required: false
    default: ''

  # ── PR comments ──
  comment-key:
    description: 'Shared PR comment key. Defaults to workflow + component.'
    required: false
    default: ''
  comment-section-key:
    description: 'Section key within the shared PR comment.'
    required: false
    default: ''
  comment-section-title:
    description: 'Section title within the shared PR comment.'
    required: false
    default: ''

  # ── SSH (for fleet/deploy) ──
  ssh-key:
    description: 'SSH private key for fleet/deploy commands. Writes to ~/.ssh, starts ssh-agent, configures known_hosts. If empty, assumes SSH is pre-configured.'
    required: false
    default: ''
  ssh-known-hosts:
    description: 'Extra known_hosts entries for SSH connections to your servers.'
    required: false
    default: ''

  # ── Release ──
  release-dry-run:
    description: 'Preview the release without making changes.'
    required: false
    default: 'false'
  release-branch:
    description: 'Branch that releases are allowed from.'
    required: false
    default: 'main'

outputs:
  results:
    description: 'JSON object with pass/fail results for each command'
    value: ${{ steps.select-results.outputs.results }}
  binary-source:
    description: 'How the binary was obtained: "prebuilt", "source", "fallback", or "release"'
    value: ${{ steps.resolve-binary.outputs.binary-source }}
  scope-context:
    description: 'Execution context: "pr", "push", "cron", or "manual"'
    value: ${{ steps.resolve-scope.outputs.scope-context }}
  scope-effective:
    description: 'Effective execution scope: "changed" or "full"'
    value: ${{ steps.resolve-scope.outputs.scope-mode }}
  scope-is-fork:
    description: 'Whether the PR is from a fork (true/false)'
    value: ${{ steps.resolve-scope.outputs.scope-is-fork }}
  operations-results:
    description: 'JSON object with pass/fail results for each fleet/deploy command'
    value: ${{ steps.run-operations.outputs.results }}
  released:
    description: 'Whether a release was created (true/false)'
    value: ${{ steps.release.outputs.released }}
  release-version:
    description: 'The released version number (e.g. 1.2.3)'
    value: ${{ steps.release.outputs.release-version }}
  release-tag:
    description: 'The release git tag (e.g. v1.2.3)'
    value: ${{ steps.release.outputs.release-tag }}
  release-bump-type:
    description: 'The bump type used (patch, minor, major)'
    value: ${{ steps.release.outputs.bump-type }}

runs:
  using: 'composite'
  steps:
    # ── Phase 1: Read project config ──

    - name: Read portable config
      id: read-config
      shell: bash
      env:
        COMPONENT_NAME: ${{ inputs.component }}
        EXTENSION_INPUT: ${{ inputs.extension }}
      run: bash ${{ github.action_path }}/scripts/setup/read-portable-config.sh

    # ── Phase 2: Resolve execution context ──

    - name: Resolve execution scope
      id: resolve-scope
      shell: bash
      env:
        BASE_SHA: ${{ github.event.pull_request.base.sha }}
        PR_HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
      run: bash ${{ github.action_path }}/scripts/scope/resolve.sh

    - name: Resolve commands
      id: resolve-commands
      shell: bash
      env:
        COMMANDS_INPUT: ${{ inputs.commands }}
      run: bash ${{ github.action_path }}/scripts/core/resolve-commands.sh

    # ── Phase 3: Install Homeboy ──
    # Homeboy installs before PHP/Node so we can use `homeboy component env`
    # to detect runtime requirements from the source files (e.g., WordPress
    # "Requires PHP" header).

    - name: Install pre-built binary
      id: install-prebuilt
      if: inputs.binary-path != ''
      shell: bash
      run: |
        BINARY="${{ inputs.binary-path }}"
        if [ ! -f "${BINARY}" ]; then
          echo "::error::binary-path '${BINARY}' does not exist"
          exit 1
        fi
        chmod +x "${BINARY}"
        sudo cp "${BINARY}" /usr/local/bin/homeboy
        echo "Installed pre-built binary: $(homeboy --version)"

    - name: Install Rust toolchain (source build)
      if: inputs.binary-path == '' && inputs.source != ''
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: ${{ inputs.rust-toolchain }}

    - name: Cache cargo (source build)
      if: inputs.binary-path == '' && inputs.source != ''
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          ${{ inputs.source }}/target
        key: ${{ runner.os }}-cargo-source-${{ hashFiles(format('{0}/Cargo.lock', inputs.source)) }}
        restore-keys: ${{ runner.os }}-cargo-source-

    - name: Build from source
      id: source-build
      if: inputs.binary-path == '' && inputs.source != ''
      shell: bash
      env:
        SOURCE_PATH: ${{ inputs.source }}
      run: bash ${{ github.action_path }}/scripts/setup/build-source-homeboy.sh

    - name: Resolve Homeboy version
      id: resolve-version
      if: inputs.binary-path == '' && (inputs.source == '' || steps.source-build.outputs.built != 'true')
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        HOMEBOY_VERSION: ${{ inputs.version }}
      run: bash ${{ github.action_path }}/scripts/setup/resolve-homeboy-version.sh

    - name: Cache Homeboy
      id: cache-homeboy
      if: inputs.binary-path == '' && (inputs.source == '' || steps.source-build.outputs.built != 'true')
      uses: actions/cache@v4
      with:
        path: |
          /usr/local/bin/homeboy
          ~/.config/homeboy/extensions/
        key: homeboy-${{ steps.resolve-version.outputs.resolved-version }}-${{ steps.read-config.outputs.portable-extension }}-${{ runner.os }}-${{ runner.arch }}

    - name: Install Homeboy
      if: inputs.binary-path == '' && (inputs.source == '' || steps.source-build.outputs.built != 'true') && steps.cache-homeboy.outputs.cache-hit != 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        HOMEBOY_VERSION: ${{ steps.resolve-version.outputs.resolved-version }}
      run: bash ${{ github.action_path }}/scripts/setup/install-homeboy-release.sh

    - name: Resolve binary source
      id: resolve-binary
      shell: bash
      env:
        HAS_BINARY_PATH_INPUT: ${{ inputs.binary-path }}
        HAS_SOURCE_INPUT: ${{ inputs.source }}
        SOURCE_BUILT: ${{ steps.source-build.outputs.built }}
      run: bash ${{ github.action_path }}/scripts/setup/resolve-binary-source.sh

    - name: Install extension
      if: steps.read-config.outputs.portable-extension != '' && (inputs.binary-path != '' || steps.cache-homeboy.outputs.cache-hit != 'true' || steps.source-build.outputs.built == 'true')
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        EXTENSION_ID: ${{ steps.read-config.outputs.portable-extension }}
        EXTENSION_SOURCE: ${{ inputs.extension-source }}
      run: bash ${{ github.action_path }}/scripts/setup/install-extension.sh

    - name: Capture tooling metadata
      shell: bash
      env:
        EXTENSION_SOURCE: ${{ inputs.extension-source }}
        ACTION_REF: ${{ github.action_ref }}
        ACTION_REPOSITORY: ${{ github.action_repository }}
      run: bash ${{ github.action_path }}/scripts/setup/capture-tooling-metadata.sh

    # ── Phase 4: Detect runtime + setup environment ──
    # Uses `homeboy component env` to detect PHP/Node versions from source
    # files. For WordPress, reads "Requires PHP" from the plugin/theme header.
    # Action input overrides take priority over detected values.

    - name: Detect runtime environment
      id: detect-env
      shell: bash
      env:
        PHP_INPUT: ${{ inputs.php-version }}
        NODE_INPUT: ${{ inputs.node-version }}
        COMPONENT_DIR: ${{ steps.read-config.outputs.component-dir }}
      run: bash ${{ github.action_path }}/scripts/setup/detect-runtime-env.sh

    - name: Setup PHP
      if: steps.detect-env.outputs.portable-php != ''
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ steps.detect-env.outputs.portable-php }}
        extensions: mbstring, intl, pdo_sqlite, mysqli
        tools: composer:v2
        coverage: none

    - name: Setup Node.js
      if: steps.detect-env.outputs.portable-node != ''
      uses: actions/setup-node@v4
      with:
        node-version: ${{ steps.detect-env.outputs.portable-node }}

    - name: Auto-setup environment
      if: inputs.auto-setup == 'true'
      shell: bash
      run: bash ${{ github.action_path }}/scripts/setup/auto-setup-environment.sh

    # ── Phase 4b: SSH setup (for fleet/deploy) ──

    - name: Setup SSH
      id: setup-ssh
      if: contains(steps.resolve-commands.outputs.operations-commands, 'fleet') || contains(steps.resolve-commands.outputs.operations-commands, 'deploy') || inputs.ssh-key != ''
      shell: bash
      env:
        SSH_KEY: ${{ inputs.ssh-key }}
        SSH_KNOWN_HOSTS: ${{ inputs.ssh-known-hosts }}
      run: bash ${{ github.action_path }}/scripts/setup/setup-ssh.sh

    # ── Phase 5: Run commands ──

    # Bail early if the PR was merged or closed while earlier jobs ran.
    # The concurrency group cancels stale runs when a NEW push arrives,
    # but merging doesn't trigger a new PR event — so the run continues.
    # This guard prevents wasting CI minutes on zombie runs.
    - name: Check PR state
      id: check-pr-state
      if: github.event_name == 'pull_request'
      shell: bash
      env:
        PR_NUMBER: ${{ github.event.pull_request.number }}
      run: |
        source "${GITHUB_ACTION_PATH}/scripts/core/lib.sh"
        if ! pr_is_active; then
          echo "::warning::PR #${PR_NUMBER} is no longer open (merged or closed) — skipping remaining steps"
          echo "active=false" >> "${GITHUB_OUTPUT}"
        else
          echo "active=true" >> "${GITHUB_OUTPUT}"
        fi

    - name: Run Homeboy commands
      id: run-commands
      continue-on-error: true
      if: steps.check-pr-state.outputs.active != 'false' && steps.resolve-commands.outputs.resolved-commands != ''
      shell: bash
      env:
        COMPONENT_NAME: ${{ inputs.component }}
        EXTRA_ARGS: ${{ inputs.args }}
        RUN_GROUP_PREFIX: homeboy
      run: bash ${{ github.action_path }}/scripts/core/run-homeboy-commands.sh

    # ── Phase 6: Autofix ──
    # Autofix defaults: enabled when app-token is provided.
    # Explicit input overrides the default.

    - name: Apply autofix commit
      id: autofix-commit
      if: |
        always()
        && github.event_name == 'pull_request'
        && steps.run-commands.outputs.results != ''
        && inputs.autofix == 'true'
        && (inputs.autofix-mode == 'always' || contains(steps.run-commands.outputs.results, '"fail"'))
      shell: bash
      env:
        COMMANDS: ${{ steps.resolve-commands.outputs.resolved-commands }}
        COMPONENT_NAME: ${{ inputs.component }}
        EXTRA_ARGS: ${{ inputs.args }}
        AUTOFIX_COMMANDS: ${{ inputs.autofix-commands }}
        AUTOFIX_LABEL: ${{ inputs.autofix-label }}
        AUTOFIX_MAX_COMMITS: ${{ inputs.autofix-max-commits }}
        AUTOFIX_MODE: ${{ inputs.autofix-mode }}
        PR_LABELS_JSON: ${{ toJson(github.event.pull_request.labels.*.name) }}
        PR_HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        APP_TOKEN: ${{ inputs.app-token }}
      run: bash ${{ github.action_path }}/scripts/autofix/apply-autofix-commit.sh

    - name: Prepare non-PR autofix branch
      id: autofix-prepare-nonpr
      if: |
        always()
        && github.event_name != 'pull_request'
        && steps.run-commands.outputs.results != ''
        && inputs.autofix == 'true'
        && inputs.autofix-open-pr == 'true'
        && (inputs.autofix-mode == 'always' || contains(steps.run-commands.outputs.results, '"fail"'))
      shell: bash
      env:
        COMMANDS: ${{ steps.resolve-commands.outputs.resolved-commands }}
        COMPONENT_NAME: ${{ inputs.component }}
        EXTRA_ARGS: ${{ inputs.args }}
        AUTOFIX_COMMANDS: ${{ inputs.autofix-commands }}
        AUTOFIX_MAX_COMMITS: ${{ inputs.autofix-max-commits }}
        APP_TOKEN: ${{ inputs.app-token }}
      run: bash ${{ github.action_path }}/scripts/autofix/prepare-autofix-branch.sh

    - name: Open non-PR autofix PR
      id: autofix-open-pr
      if: github.event_name != 'pull_request' && steps.autofix-prepare-nonpr.outputs.committed == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.app-token || github.token }}
        COMPONENT_NAME: ${{ inputs.component }}
        AUTOFIX_BRANCH: ${{ steps.autofix-prepare-nonpr.outputs.autofix-branch }}
        AUTOFIX_FILE_COUNT: ${{ steps.autofix-prepare-nonpr.outputs.autofix-file-count }}
        AUTOFIX_FIX_TYPES: ${{ steps.autofix-prepare-nonpr.outputs.autofix-fix-types }}
        AUTOFIX_FINDING_TYPES: ${{ steps.autofix-prepare-nonpr.outputs.autofix-finding-types }}
      run: bash ${{ github.action_path }}/scripts/autofix/open-autofix-pr.sh

    # ── Phase 7: Results and reporting ──

    - name: Select final results
      id: select-results
      if: always()
      shell: bash
      env:
        FIRST_RESULTS: ${{ steps.run-commands.outputs.results }}
      run: bash ${{ github.action_path }}/scripts/core/select-final-results.sh

    - name: Generate failure digest
      if: always() && steps.select-results.outputs.results != '' && contains(steps.select-results.outputs.results, '"fail"')
      shell: bash
      env:
        RESULTS: ${{ steps.select-results.outputs.results }}
        COMMANDS: ${{ steps.resolve-commands.outputs.resolved-commands }}
        AUTOFIX_ENABLED: ${{ inputs.autofix == 'true' }}
        AUTOFIX_ATTEMPTED: ${{ steps.autofix-commit.outputs.committed == 'true' || steps.autofix-prepare-nonpr.outputs.committed == 'true' }}
        AUTOFIX_COMMANDS: ${{ inputs.autofix-commands }}
      run: bash ${{ github.action_path }}/scripts/digest/generate-failure-digest.sh

    - name: Run release
      id: release
      if: contains(steps.resolve-commands.outputs.resolved-commands, 'release') && github.event_name != 'pull_request'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.app-token || github.token }}
        RELEASE_DRY_RUN: ${{ inputs.release-dry-run }}
        RELEASE_BRANCH: ${{ inputs.release-branch }}
        COMPONENT_NAME: ${{ inputs.component }}
      run: bash ${{ github.action_path }}/scripts/release/run-release.sh

    # ── Phase 7b: Operations (fleet/deploy) ──
    # Runs after quality gates and release — the primary use case is
    # "release then deploy" or "release then fleet exec upgrade".
    # Only runs when operations commands are present.

    - name: Run operations (fleet/deploy)
      id: run-operations
      if: steps.resolve-commands.outputs.operations-commands != ''
      continue-on-error: true
      shell: bash
      env:
        OPERATIONS_COMMANDS: ${{ steps.resolve-commands.outputs.operations-commands }}
        EXTRA_ARGS: ${{ inputs.args }}
        RUN_GROUP_PREFIX: homeboy
      run: bash ${{ github.action_path }}/scripts/operations/run-operations.sh

    - name: Enforce final status
      id: enforce-status
      if: always()
      shell: bash
      env:
        RESULTS: ${{ steps.select-results.outputs.results }}
        COMMANDS: ${{ steps.resolve-commands.outputs.resolved-commands }}
        OPERATIONS_RESULTS: ${{ steps.run-operations.outputs.results }}
        PR_ACTIVE: ${{ steps.check-pr-state.outputs.active }}
      run: bash ${{ github.action_path }}/scripts/core/enforce-final-status.sh

    - name: Post PR comment
      if: always() && github.event_name == 'pull_request' && steps.check-pr-state.outputs.active != 'false'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.app-token || github.token }}
        COMMANDS: ${{ steps.resolve-commands.outputs.resolved-commands }}
        COMPONENT_NAME: ${{ inputs.component }}
        RESULTS: ${{ steps.select-results.outputs.results }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        BINARY_SOURCE: ${{ steps.resolve-binary.outputs.binary-source }}
        AUTOFIX_ENABLED: ${{ inputs.autofix == 'true' }}
        AUTOFIX_ATTEMPTED: ${{ steps.autofix-commit.outputs.attempted }}
        AUTOFIX_COMMITTED: ${{ steps.autofix-commit.outputs.committed }}
        AUTOFIX_STATUS: ${{ steps.autofix-commit.outputs.status }}
        AUTOFIX_TARGET_REPO: ${{ steps.autofix-commit.outputs.target-repo }}
        AUTOFIX_TARGET_BRANCH: ${{ steps.autofix-commit.outputs.target-branch }}
        AUTOFIX_FILE_COUNT: ${{ steps.autofix-commit.outputs.autofix-file-count }}
        AUTOFIX_FIX_TYPES: ${{ steps.autofix-commit.outputs.autofix-fix-types }}
        COMMENT_KEY_INPUT: ${{ inputs.comment-key }}
        COMMENT_SECTION_KEY_INPUT: ${{ inputs.comment-section-key }}
        COMMENT_SECTION_TITLE_INPUT: ${{ inputs.comment-section-title }}
      run: bash ${{ github.action_path }}/scripts/pr/post-pr-comment.sh

    # ── Phase 8: Auto-issue filing ──
    # Default: enabled on non-PR events (auto when input is empty).

    - name: Auto-file categorized issues
      id: categorized-issues
      if: |
        always()
        && github.event_name != 'pull_request'
        && steps.select-results.outputs.results != ''
        && (inputs.auto-issue == 'true' || (inputs.auto-issue == '' && github.event_name != 'pull_request'))
      continue-on-error: true
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.app-token || github.token }}
        RESULTS: ${{ steps.select-results.outputs.results }}
        COMMANDS: ${{ steps.resolve-commands.outputs.resolved-commands }}
        COMPONENT_NAME: ${{ inputs.component }}
        BINARY_SOURCE: ${{ steps.resolve-binary.outputs.binary-source }}
        AUTOFIX_ATTEMPTED: ${{ steps.autofix-prepare-nonpr.outputs.committed }}
        AUTOFIX_PR_CREATED: ${{ steps.autofix-open-pr.outputs.created }}
      run: bash ${{ github.action_path }}/scripts/issues/auto-file-categorized-issues.sh

    - name: Auto-file issue on failure
      if: |
        always()
        && github.event_name != 'pull_request'
        && steps.select-results.outputs.results != ''
        && contains(steps.select-results.outputs.results, '"fail"')
        && steps.categorized-issues.outcome != 'success'
        && (inputs.auto-issue == 'true' || (inputs.auto-issue == '' && github.event_name != 'pull_request'))
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.app-token || github.token }}
        RESULTS: ${{ steps.select-results.outputs.results }}
        COMMANDS: ${{ steps.resolve-commands.outputs.resolved-commands }}
        COMPONENT_NAME: ${{ inputs.component }}
        BINARY_SOURCE: ${{ steps.resolve-binary.outputs.binary-source }}
        AUTOFIX_ATTEMPTED: ${{ steps.autofix-prepare-nonpr.outputs.committed }}
        AUTOFIX_PR_CREATED: ${{ steps.autofix-open-pr.outputs.created }}
      run: bash ${{ github.action_path }}/scripts/issues/auto-file-issue.sh
