name: 'Homeboy'
description: 'Run Homeboy lint, test, and audit commands on your PRs. Works with any Homeboy extension.'
author: 'Extra Chill'

branding:
  icon: 'check-circle'
  color: 'blue'

inputs:
  version:
    description: 'Homeboy version to install (e.g. "0.52.0", "latest")'
    required: false
    default: 'latest'
  extension:
    description: 'Extension ID to install (e.g. "wordpress", "rust", "node")'
    required: false
    default: ''
  extension-source:
    description: 'Git URL or path to install the extension from'
    required: false
    default: 'https://github.com/Extra-Chill/homeboy-extensions'
  commands:
    description: 'Comma-separated list of commands to run (e.g. "lint,test", "lint,test,audit")'
    required: false
    default: 'lint,test'
  component:
    description: 'Component name (auto-detected from repo name if not specified)'
    required: false
    default: ''
  args:
    description: 'Additional arguments to pass to each command (e.g. "--skip-lint", "--errors-only")'
    required: false
    default: ''
  settings:
    description: 'JSON object of extension settings to pass (e.g. {"database_type": "sqlite"})'
    required: false
    default: ''
  php-version:
    description: 'PHP version to set up (skipped if empty — use with shivammathur/setup-php separately)'
    required: false
    default: ''
  node-version:
    description: 'Node.js version to set up (skipped if empty — use with actions/setup-node separately)'
    required: false
    default: ''
  lint-changed-only:
    description: 'Only lint files changed in the PR (default: true for PRs, ignored for non-PR events)'
    required: false
    default: 'true'

outputs:
  results:
    description: 'JSON object with pass/fail results for each command'
    value: ${{ steps.run-commands.outputs.results }}

runs:
  using: 'composite'
  steps:
    # ── Step 1: Setup PHP (optional) ──
    - name: Setup PHP
      if: inputs.php-version != ''
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ inputs.php-version }}
        extensions: mbstring, intl, pdo_sqlite, mysqli
        tools: composer:v2
        coverage: none

    # ── Step 2: Setup Node.js (optional) ──
    - name: Setup Node.js
      if: inputs.node-version != ''
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    # ── Step 3: Install Homeboy binary ──
    - name: Install Homeboy
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        HOMEBOY_VERSION: ${{ inputs.version }}
      run: |
        set -euo pipefail

        REPO="Extra-Chill/homeboy"

        # Resolve version
        if [ "$HOMEBOY_VERSION" = "latest" ]; then
          TAG=$(gh api "repos/${REPO}/releases/latest" --jq '.tag_name' 2>/dev/null || true)
          if [ -z "$TAG" ]; then
            echo "::error::Could not determine latest Homeboy release"
            exit 1
          fi
        else
          TAG="v${HOMEBOY_VERSION#v}"
        fi

        VERSION="${TAG#v}"
        echo "Installing Homeboy ${VERSION}..."

        # Determine platform
        OS=$(uname -s | tr '[:upper:]' '[:lower:]')
        ARCH=$(uname -m)

        case "${OS}-${ARCH}" in
          linux-x86_64)   TARGET="x86_64-unknown-linux-gnu" ;;
          linux-aarch64)   TARGET="aarch64-unknown-linux-gnu" ;;
          darwin-x86_64)   TARGET="x86_64-apple-darwin" ;;
          darwin-arm64)    TARGET="aarch64-apple-darwin" ;;
          *)
            echo "::error::Unsupported platform: ${OS}-${ARCH}"
            exit 1
            ;;
        esac

        ARCHIVE="homeboy-${TARGET}.tar.xz"
        URL="https://github.com/${REPO}/releases/download/${TAG}/${ARCHIVE}"

        echo "Downloading ${URL}..."
        curl -fsSL "${URL}" -o "/tmp/${ARCHIVE}"

        # Extract and install
        mkdir -p /tmp/homeboy-extract
        tar -xJf "/tmp/${ARCHIVE}" -C /tmp/homeboy-extract

        # cargo-dist extracts to a directory named after the target
        BINARY=$(find /tmp/homeboy-extract -name "homeboy" -type f | head -1)
        if [ -z "$BINARY" ]; then
          echo "::error::Could not find homeboy binary in archive"
          exit 1
        fi

        chmod +x "$BINARY"
        sudo mv "$BINARY" /usr/local/bin/homeboy

        echo "Homeboy $(homeboy --version) installed successfully"

    # ── Step 4: Install extension ──
    - name: Install extension
      if: inputs.extension != ''
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        EXTENSION_ID: ${{ inputs.extension }}
        EXTENSION_SOURCE: ${{ inputs.extension-source }}
      run: |
        set -euo pipefail

        echo "Installing extension: ${EXTENSION_ID} from ${EXTENSION_SOURCE}..."

        homeboy extension install "${EXTENSION_SOURCE}" --id "${EXTENSION_ID}"

        echo "Extension '${EXTENSION_ID}' installed successfully"

    # ── Step 5: Register component ──
    - name: Register component
      shell: bash
      env:
        COMPONENT_NAME: ${{ inputs.component }}
        EXTENSION_ID: ${{ inputs.extension }}
        SETTINGS_JSON: ${{ inputs.settings }}
      run: |
        set -euo pipefail

        # Determine component name
        if [ -n "$COMPONENT_NAME" ]; then
          COMP_ID="$COMPONENT_NAME"
        else
          # Derive from repo name
          COMP_ID=$(basename "$GITHUB_REPOSITORY")
        fi

        echo "Registering component: ${COMP_ID}"

        # Build create command with flags
        CREATE_CMD="homeboy component create --local-path $(pwd)"

        if [ -n "$EXTENSION_ID" ]; then
          CREATE_CMD="${CREATE_CMD} --extension ${EXTENSION_ID}"
        fi

        echo "Running: ${CREATE_CMD}"
        eval "$CREATE_CMD"

        # Apply settings overrides if provided
        if [ -n "$SETTINGS_JSON" ] && [ "$SETTINGS_JSON" != "{}" ] && [ -n "$EXTENSION_ID" ]; then
          CONFIG_DIR="${HOME}/.config/homeboy/components"
          CONFIG_FILE="${CONFIG_DIR}/${COMP_ID}.json"

          if [ -f "$CONFIG_FILE" ]; then
            echo "Applying extension settings..."
            python3 -c "
        import json, sys
        with open('${CONFIG_FILE}', 'r') as f:
            config = json.load(f)
        settings = json.loads('${SETTINGS_JSON}')
        if 'extensions' not in config:
            config['extensions'] = {}
        if '${EXTENSION_ID}' not in config['extensions']:
            config['extensions']['${EXTENSION_ID}'] = {}
        if 'settings' not in config['extensions']['${EXTENSION_ID}']:
            config['extensions']['${EXTENSION_ID}']['settings'] = {}
        config['extensions']['${EXTENSION_ID}']['settings'].update(settings)
        with open('${CONFIG_FILE}', 'w') as f:
            json.dump(config, f, indent=2)
        "
          fi
        fi

        # Verify component was created
        homeboy component list 2>/dev/null | grep -q "${COMP_ID}" || {
          echo "::error::Failed to register component '${COMP_ID}'"
          exit 1
        }

        echo "Component '${COMP_ID}' registered successfully"
        echo "component-id=${COMP_ID}" >> "$GITHUB_ENV"

    # ── Step 6: Compute changed files for PR scoping ──
    - name: Compute changed files
      id: changed-files
      if: github.event_name == 'pull_request' && inputs.lint-changed-only == 'true'
      shell: bash
      run: |
        set -euo pipefail

        BASE_SHA="${{ github.event.pull_request.base.sha }}"
        HEAD_SHA="${{ github.event.pull_request.head.sha }}"

        # Fetch both base and head with enough depth for a proper diff
        echo "Fetching base (${BASE_SHA:0:8}) and head (${HEAD_SHA:0:8})..."
        git fetch origin "${BASE_SHA}" "${HEAD_SHA}" --depth=1 2>/dev/null || true

        # Try merge-base diff first, fall back to straight diff
        CHANGED_FILES=$(git diff --name-only --diff-filter=ACMR "${BASE_SHA}..${HEAD_SHA}" 2>/dev/null || true)

        if [ -z "$CHANGED_FILES" ]; then
          echo "No changed files detected — will run full lint"
          echo "has-changes=false" >> "$GITHUB_OUTPUT"
        else
          FILE_COUNT=$(echo "$CHANGED_FILES" | wc -l | xargs)
          echo "Found ${FILE_COUNT} changed files"

          # Build absolute paths and create brace glob for homeboy --glob
          WORKSPACE="$(pwd)"
          ABS_FILES=""
          while IFS= read -r file; do
            if [ -n "$ABS_FILES" ]; then
              ABS_FILES="${ABS_FILES},${WORKSPACE}/${file}"
            else
              ABS_FILES="${WORKSPACE}/${file}"
            fi
          done <<< "$CHANGED_FILES"

          # Single file doesn't need braces, multiple files use {a,b,c} glob
          if [ "$FILE_COUNT" -eq 1 ]; then
            GLOB="${ABS_FILES}"
          else
            GLOB="{${ABS_FILES}}"
          fi

          echo "has-changes=true" >> "$GITHUB_OUTPUT"
          echo "file-count=${FILE_COUNT}" >> "$GITHUB_OUTPUT"

          # Write glob to file to avoid shell escaping issues
          echo "${GLOB}" > /tmp/homeboy-changed-glob.txt
          echo "HOMEBOY_CHANGED_GLOB=${GLOB}" >> "$GITHUB_ENV"
        fi

    # ── Step 7: Run commands ──
    - name: Run Homeboy commands
      id: run-commands
      shell: bash
      env:
        COMMANDS: ${{ inputs.commands }}
        COMPONENT_NAME: ${{ inputs.component }}
        EXTRA_ARGS: ${{ inputs.args }}
      run: |
        set -euo pipefail

        # Determine component ID
        if [ -n "$COMPONENT_NAME" ]; then
          COMP_ID="$COMPONENT_NAME"
        elif [ -n "${component_id:-}" ]; then
          COMP_ID="${component_id}"
        else
          COMP_ID=$(basename "$GITHUB_REPOSITORY")
        fi

        WORKSPACE="$(pwd)"
        RESULTS="{}"
        OVERALL_EXIT=0

        # Create temp dir for capturing output
        HOMEBOY_OUTPUT_DIR=$(mktemp -d)
        echo "HOMEBOY_OUTPUT_DIR=${HOMEBOY_OUTPUT_DIR}" >> "$GITHUB_ENV"

        # Parse comma-separated commands
        IFS=',' read -ra CMD_ARRAY <<< "$COMMANDS"

        for CMD in "${CMD_ARRAY[@]}"; do
          # Trim whitespace
          CMD=$(echo "$CMD" | xargs)

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Running: homeboy ${CMD} ${COMP_ID}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""

          # Build the command — audit uses positional path, lint/test use --path
          # See: https://github.com/Extra-Chill/homeboy/issues/374
          if [ "$CMD" = "audit" ]; then
            FULL_CMD="homeboy audit ${WORKSPACE}"
          elif [ "$CMD" = "lint" ] && [ -n "${HOMEBOY_CHANGED_GLOB:-}" ]; then
            # Scope lint to changed files only (PR mode)
            FULL_CMD="homeboy lint ${COMP_ID} --path ${WORKSPACE} --glob '${HOMEBOY_CHANGED_GLOB}'"
          else
            FULL_CMD="homeboy ${CMD} ${COMP_ID} --path ${WORKSPACE}"
          fi

          if [ -n "$EXTRA_ARGS" ]; then
            FULL_CMD="${FULL_CMD} ${EXTRA_ARGS}"
          fi

          echo "::group::homeboy ${CMD}"

          CMD_EXIT=0
          set +e
          eval "$FULL_CMD" 2>&1 | tee "${HOMEBOY_OUTPUT_DIR}/${CMD}.log"
          CMD_EXIT=${PIPESTATUS[0]}
          set -e

          echo "::endgroup::"

          if [ $CMD_EXIT -eq 0 ]; then
            echo "::notice::homeboy ${CMD}: PASSED"
            RESULTS=$(echo "$RESULTS" | python3 -c "
        import json, sys
        d = json.loads(sys.stdin.read())
        d['${CMD}'] = 'pass'
        print(json.dumps(d))
        ")
          else
            echo "::error::homeboy ${CMD}: FAILED (exit code ${CMD_EXIT})"
            RESULTS=$(echo "$RESULTS" | python3 -c "
        import json, sys
        d = json.loads(sys.stdin.read())
        d['${CMD}'] = 'fail'
        print(json.dumps(d))
        ")
            OVERALL_EXIT=1
          fi
        done

        echo ""
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "  Results: ${RESULTS}"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

        echo "results=${RESULTS}" >> "$GITHUB_OUTPUT"

        exit $OVERALL_EXIT

    # ── Step 7: Post PR comment ──
    - name: Post PR comment
      if: always() && github.event_name == 'pull_request'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        COMMANDS: ${{ inputs.commands }}
        COMPONENT_NAME: ${{ inputs.component }}
        RESULTS: ${{ steps.run-commands.outputs.results }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
      run: |
        set -euo pipefail

        OUTPUT_DIR="${HOMEBOY_OUTPUT_DIR:-}"
        REPO="${GITHUB_REPOSITORY}"
        COMP_ID="${COMPONENT_NAME:-$(basename "$GITHUB_REPOSITORY")}"

        if [ -z "$OUTPUT_DIR" ] || [ -z "$PR_NUMBER" ]; then
          echo "Skipping PR comment — missing output dir or PR number"
          exit 0
        fi

        # ── Build the comment body ──
        COMMENT_BODY="<!-- homeboy-action-results -->"$'\n'
        COMMENT_BODY+="## Homeboy Results — \`${COMP_ID}\`"$'\n\n'

        # Parse results and build summary table
        IFS=',' read -ra CMD_ARRAY <<< "$COMMANDS"
        HAS_FAILURE=false

        for CMD in "${CMD_ARRAY[@]}"; do
          CMD=$(echo "$CMD" | xargs)
          LOG_FILE="${OUTPUT_DIR}/${CMD}.log"

          # Determine pass/fail from results JSON
          STATUS=$(echo "$RESULTS" | python3 -c "
        import json, sys
        try:
            d = json.loads(sys.stdin.read())
            print(d.get('${CMD}', 'unknown'))
        except:
            print('unknown')
        " 2>/dev/null || echo "unknown")

          if [ "$STATUS" = "pass" ]; then
            ICON="white_check_mark"
          else
            ICON="x"
            HAS_FAILURE=true
          fi

          # Add scope indicator for lint
          SCOPE_NOTE=""
          if [ "$CMD" = "lint" ] && [ -n "${HOMEBOY_CHANGED_GLOB:-}" ]; then
            CHANGED_COUNT="${{ steps.changed-files.outputs.file-count }}"
            SCOPE_NOTE=" _(${CHANGED_COUNT:-?} changed files)_"
          fi

          COMMENT_BODY+=":${ICON}: **${CMD}**${SCOPE_NOTE}"$'\n'

          # Extract summaries from log file
          if [ -f "$LOG_FILE" ]; then
            # PHPCS summary
            PHPCS_SUMMARY=$(grep -o "LINT SUMMARY: .*" "$LOG_FILE" | head -1 || true)
            if [ -n "$PHPCS_SUMMARY" ]; then
              FIXABLE=$(grep -o "Fixable: [0-9]*" "$LOG_FILE" | head -1 || true)
              FILES_INFO=$(grep -o "Files with issues: .*" "$LOG_FILE" | head -1 || true)
              COMMENT_BODY+="- PHPCS: ${PHPCS_SUMMARY}"$'\n'
              if [ -n "$FIXABLE" ]; then
                COMMENT_BODY+="- ${FIXABLE} | ${FILES_INFO}"$'\n'
              fi
            fi

            # Top violations (first 5)
            TOP_VIOLATIONS=$(sed -n '/TOP VIOLATIONS:/,/^$/p' "$LOG_FILE" | grep -E '^\s+\S' | head -5 || true)
            if [ -n "$TOP_VIOLATIONS" ]; then
              COMMENT_BODY+=$'\n'"<details><summary>Top violations</summary>"$'\n\n'"\`\`\`"$'\n'
              COMMENT_BODY+="${TOP_VIOLATIONS}"$'\n'
              COMMENT_BODY+="\`\`\`"$'\n'"</details>"$'\n'
            fi

            # PHPStan summary
            PHPSTAN_SUMMARY=$(grep -o "PHPSTAN SUMMARY: .*" "$LOG_FILE" | head -1 || true)
            if [ -n "$PHPSTAN_SUMMARY" ]; then
              COMMENT_BODY+="- PHPStan: ${PHPSTAN_SUMMARY}"$'\n'
            fi

            # PHPUnit failure
            BUILD_FAILED=$(grep -o "BUILD FAILED: .*" "$LOG_FILE" | head -1 || true)
            if [ -n "$BUILD_FAILED" ]; then
              COMMENT_BODY+="- ${BUILD_FAILED}"$'\n'
            fi

            # Fatal errors
            FATAL=$(grep "PHP Fatal error:" "$LOG_FILE" | head -1 | sed 's/.*PHP Fatal error:/Fatal:/' || true)
            if [ -n "$FATAL" ]; then
              COMMENT_BODY+=$'\n'"<details><summary>Fatal error</summary>"$'\n\n'"\`\`\`"$'\n'
              COMMENT_BODY+="${FATAL}"$'\n'
              COMMENT_BODY+="\`\`\`"$'\n'"</details>"$'\n'
            fi

            # Audit findings
            AUDIT_SCORE=$(grep -o "Alignment score: .*" "$LOG_FILE" | head -1 || true)
            if [ -n "$AUDIT_SCORE" ]; then
              COMMENT_BODY+="- ${AUDIT_SCORE}"$'\n'
            fi
            AUDIT_FINDINGS=$(grep -oE "[0-9]+ findings?" "$LOG_FILE" | tail -1 || true)
            if [ -n "$AUDIT_FINDINGS" ]; then
              COMMENT_BODY+="- ${AUDIT_FINDINGS}"$'\n'
            fi
          fi

          COMMENT_BODY+=$'\n'
        done

        # Footer
        COMMENT_BODY+="---"$'\n'
        COMMENT_BODY+="*[Homeboy Action](https://github.com/Extra-Chill/homeboy-action) v1 — "
        COMMENT_BODY+="$(homeboy --version 2>/dev/null || echo 'homeboy')*"

        # ── Find existing comment or create new one ──
        EXISTING_COMMENT_ID=$(gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" \
          --jq '.[] | select(.body | startswith("<!-- homeboy-action-results -->")) | .id' \
          2>/dev/null | head -1 || true)

        if [ -n "$EXISTING_COMMENT_ID" ]; then
          echo "Updating existing comment ${EXISTING_COMMENT_ID}..."
          gh api "repos/${REPO}/issues/comments/${EXISTING_COMMENT_ID}" \
            --method PATCH \
            --field body="$COMMENT_BODY" > /dev/null
        else
          echo "Creating new comment..."
          gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" \
            --method POST \
            --field body="$COMMENT_BODY" > /dev/null
        fi

        echo "PR comment posted successfully"
