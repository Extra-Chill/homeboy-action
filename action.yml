name: 'Homeboy'
description: 'Run Homeboy lint, test, and audit commands on your PRs. Works with any Homeboy extension.'
author: 'Extra Chill'

branding:
  icon: 'check-circle'
  color: 'blue'

inputs:
  version:
    description: 'Homeboy version to install (e.g. "0.52.0", "latest"). Ignored when source is set.'
    required: false
    default: 'latest'
  source:
    description: 'Path to build homeboy from source (e.g. "."). Falls back to release binary on build failure.'
    required: false
    default: ''
  rust-toolchain:
    description: 'Rust toolchain for source builds (default: stable). Ignored when source is empty.'
    required: false
    default: 'stable'
  extension:
    description: 'Extension ID to install (e.g. "wordpress", "rust", "node")'
    required: false
    default: ''
  extension-source:
    description: 'Git URL or path to install the extension from'
    required: false
    default: 'https://github.com/Extra-Chill/homeboy-extensions'
  commands:
    description: 'Comma-separated list of commands to run (e.g. "lint,test", "lint,test,audit")'
    required: false
    default: 'lint,test'
  component:
    description: 'Component name (auto-detected from repo name if not specified)'
    required: false
    default: ''
  args:
    description: 'Additional arguments to pass to each command (e.g. "--skip-lint", "--errors-only")'
    required: false
    default: ''
  settings:
    description: 'Deprecated: use homeboy.json for extension settings and project config'
    required: false
    default: ''
  php-version:
    description: 'PHP version to set up (skipped if empty — use with shivammathur/setup-php separately)'
    required: false
    default: ''
  node-version:
    description: 'Node.js version to set up (skipped if empty — use with actions/setup-node separately)'
    required: false
    default: ''
  lint-changed-only:
    description: 'Only lint files changed in the PR (default: true for PRs, ignored for non-PR events)'
    required: false
    default: 'true'
  test-scope:
    description: 'Test execution scope: "full" or "changed" (PRs only for changed). Default: full'
    required: false
    default: 'full'
  auto-issue:
    description: 'Automatically file a GitHub issue on non-PR failures (default: false)'
    required: false
    default: 'false'
  autofix:
    description: 'If true, attempt safe autofixes on PR failures, commit, push, and re-run commands'
    required: false
    default: 'false'
  autofix-commands:
    description: 'Comma-separated autofix commands to run when autofix is enabled (e.g. "lint --fix,test --fix")'
    required: false
    default: ''
  autofix-label:
    description: 'Optional PR label required to allow autofix (e.g. "autofix")'
    required: false
    default: ''

outputs:
  results:
    description: 'JSON object with pass/fail results for each command'
    value: ${{ steps.select-results.outputs.results }}
  binary-source:
    description: 'How the binary was obtained: "source", "fallback", or "release"'
    value: ${{ steps.resolve-binary.outputs.binary-source }}
  test-scope-effective:
    description: 'Effective test scope used by the action (full or changed)'
    value: ${{ steps.resolve-test-scope.outputs.effective-test-scope }}

runs:
  using: 'composite'
  steps:
    - name: Setup PHP
      if: inputs.php-version != ''
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ inputs.php-version }}
        extensions: mbstring, intl, pdo_sqlite, mysqli
        tools: composer:v2
        coverage: none

    - name: Setup Node.js
      if: inputs.node-version != ''
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: Install Rust toolchain (source build)
      if: inputs.source != ''
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: ${{ inputs.rust-toolchain }}

    - name: Cache cargo (source build)
      if: inputs.source != ''
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          ${{ inputs.source }}/target
        key: ${{ runner.os }}-cargo-source-${{ hashFiles(format('{0}/Cargo.lock', inputs.source)) }}
        restore-keys: ${{ runner.os }}-cargo-source-

    - name: Build from source
      id: source-build
      if: inputs.source != ''
      shell: bash
      env:
        SOURCE_PATH: ${{ inputs.source }}
      run: bash ${{ github.action_path }}/scripts/build-source-homeboy.sh

    - name: Resolve Homeboy version
      id: resolve-version
      if: inputs.source == '' || steps.source-build.outputs.built != 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        HOMEBOY_VERSION: ${{ inputs.version }}
      run: bash ${{ github.action_path }}/scripts/resolve-homeboy-version.sh

    - name: Cache Homeboy
      id: cache-homeboy
      if: inputs.source == '' || steps.source-build.outputs.built != 'true'
      uses: actions/cache@v4
      with:
        path: |
          /usr/local/bin/homeboy
          ~/.config/homeboy/extensions/
        key: homeboy-${{ steps.resolve-version.outputs.resolved-version }}-${{ inputs.extension }}-${{ runner.os }}-${{ runner.arch }}

    - name: Install Homeboy
      if: (inputs.source == '' || steps.source-build.outputs.built != 'true') && steps.cache-homeboy.outputs.cache-hit != 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        HOMEBOY_VERSION: ${{ steps.resolve-version.outputs.resolved-version }}
      run: bash ${{ github.action_path }}/scripts/install-homeboy-release.sh

    - name: Resolve binary source
      id: resolve-binary
      shell: bash
      env:
        HAS_SOURCE_INPUT: ${{ inputs.source }}
        SOURCE_BUILT: ${{ steps.source-build.outputs.built }}
      run: bash ${{ github.action_path }}/scripts/resolve-binary-source.sh

    - name: Install extension
      if: inputs.extension != '' && (steps.cache-homeboy.outputs.cache-hit != 'true' || steps.source-build.outputs.built == 'true')
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        EXTENSION_ID: ${{ inputs.extension }}
        EXTENSION_SOURCE: ${{ inputs.extension-source }}
      run: bash ${{ github.action_path }}/scripts/install-extension.sh

    - name: Capture tooling metadata
      shell: bash
      env:
        EXTENSION_ID: ${{ inputs.extension }}
        EXTENSION_SOURCE: ${{ inputs.extension-source }}
        ACTION_REF: ${{ github.action_ref }}
        ACTION_REPOSITORY: ${{ github.action_repository }}
      run: bash ${{ github.action_path }}/scripts/capture-tooling-metadata.sh

    - name: Verify portable config
      shell: bash
      run: bash ${{ github.action_path }}/scripts/verify-portable-config.sh

    - name: Determine PR base ref
      id: changed-files
      if: github.event_name == 'pull_request' && (inputs.lint-changed-only == 'true' || inputs.test-scope == 'changed')
      shell: bash
      env:
        BASE_SHA: ${{ github.event.pull_request.base.sha }}
      run: bash ${{ github.action_path }}/scripts/determine-pr-base-ref.sh

    - name: Resolve effective test scope
      id: resolve-test-scope
      if: github.event_name == 'pull_request'
      shell: bash
      env:
        TEST_SCOPE: ${{ inputs.test-scope }}
      run: bash ${{ github.action_path }}/scripts/resolve-test-scope.sh

    - name: Run Homeboy commands
      id: run-commands
      continue-on-error: true
      shell: bash
      env:
        COMMANDS: ${{ inputs.commands }}
        COMPONENT_NAME: ${{ inputs.component }}
        EXTRA_ARGS: ${{ inputs.args }}
        TEST_SCOPE: ${{ steps.resolve-test-scope.outputs.effective-test-scope || inputs.test-scope }}
        RUN_GROUP_PREFIX: homeboy
      run: bash ${{ github.action_path }}/scripts/run-homeboy-commands.sh

    - name: Apply autofix commit
      id: autofix-commit
      if: always() && github.event_name == 'pull_request' && inputs.autofix == 'true' && steps.run-commands.outputs.results != '' && contains(steps.run-commands.outputs.results, '"fail"')
      shell: bash
      env:
        COMMANDS: ${{ inputs.commands }}
        COMPONENT_NAME: ${{ inputs.component }}
        EXTRA_ARGS: ${{ inputs.args }}
        AUTOFIX_COMMANDS: ${{ inputs.autofix-commands }}
        AUTOFIX_LABEL: ${{ inputs.autofix-label }}
        PR_LABELS_JSON: ${{ toJson(github.event.pull_request.labels.*.name) }}
        PR_HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
      run: bash ${{ github.action_path }}/scripts/apply-autofix-commit.sh

    - name: Re-run Homeboy commands after autofix
      id: rerun-commands
      continue-on-error: true
      if: github.event_name == 'pull_request' && steps.autofix-commit.outputs.committed == 'true'
      shell: bash
      env:
        COMMANDS: ${{ inputs.commands }}
        COMPONENT_NAME: ${{ inputs.component }}
        EXTRA_ARGS: ${{ inputs.args }}
        TEST_SCOPE: ${{ steps.resolve-test-scope.outputs.effective-test-scope || inputs.test-scope }}
        RUN_GROUP_PREFIX: homeboy rerun
      run: bash ${{ github.action_path }}/scripts/run-homeboy-commands.sh

    - name: Select final results
      id: select-results
      if: always()
      shell: bash
      env:
        FIRST_RESULTS: ${{ steps.run-commands.outputs.results }}
        RERUN_RESULTS: ${{ steps.rerun-commands.outputs.results }}
      run: bash ${{ github.action_path }}/scripts/select-final-results.sh

    - name: Generate failure digest
      if: always() && steps.select-results.outputs.results != '' && contains(steps.select-results.outputs.results, '"fail"')
      shell: bash
      env:
        RESULTS: ${{ steps.select-results.outputs.results }}
      run: bash ${{ github.action_path }}/scripts/generate-failure-digest.sh

    - name: Enforce final status
      if: always()
      shell: bash
      env:
        RESULTS: ${{ steps.select-results.outputs.results }}
      run: bash ${{ github.action_path }}/scripts/enforce-final-status.sh

    - name: Post PR comment
      if: always() && github.event_name == 'pull_request'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        COMMANDS: ${{ inputs.commands }}
        COMPONENT_NAME: ${{ inputs.component }}
        RESULTS: ${{ steps.select-results.outputs.results }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        BINARY_SOURCE: ${{ steps.resolve-binary.outputs.binary-source }}
        AUTOFIX_ENABLED: ${{ inputs.autofix }}
        AUTOFIX_COMMITTED: ${{ steps.autofix-commit.outputs.committed }}
        TEST_SCOPE_EFFECTIVE: ${{ steps.resolve-test-scope.outputs.effective-test-scope || inputs.test-scope }}
      run: bash ${{ github.action_path }}/scripts/post-pr-comment.sh

    - name: Post inline review
      if: always() && github.event_name == 'pull_request'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      run: bash ${{ github.action_path }}/scripts/post-inline-review.sh

    - name: Auto-file issue on failure
      if: always() && inputs.auto-issue == 'true' && github.event_name != 'pull_request' && steps.select-results.outputs.results != '' && contains(steps.select-results.outputs.results, '"fail"')
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        RESULTS: ${{ steps.select-results.outputs.results }}
        COMMANDS: ${{ inputs.commands }}
        COMPONENT_NAME: ${{ inputs.component }}
        BINARY_SOURCE: ${{ steps.resolve-binary.outputs.binary-source }}
      run: bash ${{ github.action_path }}/scripts/auto-file-issue.sh
