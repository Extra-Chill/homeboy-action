name: 'Homeboy'
description: 'Run Homeboy lint, test, audit, and release commands in CI. Works with any Homeboy extension.'
author: 'Extra Chill'

branding:
  icon: 'check-circle'
  color: 'blue'

inputs:
  version:
    description: 'Homeboy version to install (e.g. "0.52.0", "latest"). Ignored when source is set.'
    required: false
    default: 'latest'
  source:
    description: 'Path to build homeboy from source (e.g. "."). Falls back to release binary on build failure. Ignored when binary-path is set.'
    required: false
    default: ''
  binary-path:
    description: 'Path to a pre-built homeboy binary. Skips source build and release download. Use with build-once CI patterns where a prior job uploads the binary as an artifact.'
    required: false
    default: ''
  rust-toolchain:
    description: 'Rust toolchain for source builds (default: stable). Ignored when source is empty.'
    required: false
    default: 'stable'
  extension:
    description: 'Extension ID to install (e.g. "wordpress", "rust", "node")'
    required: false
    default: ''
  extension-source:
    description: 'Git URL or path to install the extension from'
    required: false
    default: 'https://github.com/Extra-Chill/homeboy-extensions'
  commands:
    description: 'Comma-separated list of commands to run (e.g. "audit,lint,test"). Commands are automatically ordered: audit → lint → test, regardless of input order.'
    required: false
    default: 'lint,test'
  component:
    description: 'Component name (auto-detected from repo name if not specified)'
    required: false
    default: ''
  args:
    description: 'Additional arguments to pass to each command (e.g. "--skip-lint", "--errors-only")'
    required: false
    default: ''
  settings:
    description: 'Deprecated: use homeboy.json for extension settings and project config'
    required: false
    default: ''
  php-version:
    description: 'PHP version to set up (skipped if empty — use with shivammathur/setup-php separately)'
    required: false
    default: ''
  node-version:
    description: 'Node.js version to set up (skipped if empty — use with actions/setup-node separately)'
    required: false
    default: ''
  scope:
    description: 'Execution scope: "changed" (default for PRs — scope to affected files) or "full" (entire codebase). Non-PR events always use full regardless of this setting.'
    required: false
    default: 'changed'
  lint-changed-only:
    description: 'Deprecated: use "scope" input instead. Kept for backward compatibility.'
    required: false
    default: 'true'
  test-scope:
    description: 'Deprecated: use "scope" input instead. Kept for backward compatibility.'
    required: false
    default: 'full'
  auto-issue:
    description: 'Automatically file a GitHub issue on non-PR failures (default: false)'
    required: false
    default: 'false'
  autofix:
    description: 'If true, attempt safe autofixes, commit, push, and re-run commands'
    required: false
    default: 'false'
  autofix-mode:
    description: 'When to run autofix: "on-failure" (only when commands fail) or "always" (every run, for baseline auto-ratchet)'
    required: false
    default: 'on-failure'
  autofix-open-pr:
    description: 'If true, non-PR failures can open an autofix PR when rerun passes after fixes'
    required: false
    default: 'false'
  autofix-max-commits:
    description: 'Maximum autofix commits allowed per branch before stopping (loop safety)'
    required: false
    default: '2'
  autofix-commands:
    description: 'Comma-separated autofix commands to run when autofix is enabled (e.g. "lint --fix,test --fix")'
    required: false
    default: ''
  autofix-label:
    description: 'Optional PR label required to allow autofix (e.g. "autofix")'
    required: false
    default: ''
  app-token:
    description: 'GitHub App token for autofix pushes. Pushes from a GitHub App trigger workflow re-runs (GITHUB_TOKEN pushes do not). Generate with actions/create-github-app-token.'
    required: false
    default: ''
  comment-key:
    description: 'Optional shared PR comment key. Defaults to workflow + component so separate jobs aggregate into one comment.'
    required: false
    default: ''
  comment-section-key:
    description: 'Optional section key within the shared PR comment. Defaults to the single command or current job id.'
    required: false
    default: ''
  comment-section-title:
    description: 'Optional section title within the shared PR comment. Defaults to a humanized command or job id.'
    required: false
    default: ''
  release-dry-run:
    description: 'If true, preview the release without making changes'
    required: false
    default: 'false'
  release-branch:
    description: 'Branch that releases are allowed from (default: main)'
    required: false
    default: 'main'
  release-skip-changelog:
    description: 'Deprecated: changelog generation is now handled by homeboy core. This input is ignored.'
    required: false
    default: 'false'

outputs:
  results:
    description: 'JSON object with pass/fail results for each command'
    value: ${{ steps.select-results.outputs.results }}
  binary-source:
    description: 'How the binary was obtained: "source", "fallback", or "release"'
    value: ${{ steps.resolve-binary.outputs.binary-source }}
  scope-effective:
    description: 'Effective execution scope: "changed" or "full"'
    value: ${{ steps.resolve-scope.outputs.scope-mode }}
  scope-is-fork:
    description: 'Whether the PR is from a fork (true/false)'
    value: ${{ steps.resolve-scope.outputs.scope-is-fork }}
  test-scope-effective:
    description: 'Deprecated: use scope-effective instead. Effective test scope used by the action (full or changed)'
    value: ${{ steps.resolve-scope.outputs.scope-mode }}
  released:
    description: 'Whether a release was created (true/false)'
    value: ${{ steps.release.outputs.released }}
  release-version:
    description: 'The released version number (e.g. 1.2.3)'
    value: ${{ steps.release.outputs.release-version }}
  release-tag:
    description: 'The release git tag (e.g. v1.2.3)'
    value: ${{ steps.release.outputs.release-tag }}
  release-bump-type:
    description: 'The bump type used (patch, minor, major)'
    value: ${{ steps.release.outputs.bump-type }}

runs:
  using: 'composite'
  steps:
    - name: Setup PHP
      if: inputs.php-version != ''
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ inputs.php-version }}
        extensions: mbstring, intl, pdo_sqlite, mysqli
        tools: composer:v2
        coverage: none

    - name: Setup Node.js
      if: inputs.node-version != ''
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: Install pre-built binary
      id: install-prebuilt
      if: inputs.binary-path != ''
      shell: bash
      run: |
        BINARY="${{ inputs.binary-path }}"
        if [ ! -f "${BINARY}" ]; then
          echo "::error::binary-path '${BINARY}' does not exist"
          exit 1
        fi
        chmod +x "${BINARY}"
        sudo cp "${BINARY}" /usr/local/bin/homeboy
        echo "Installed pre-built binary: $(homeboy --version)"

    - name: Install Rust toolchain (source build)
      if: inputs.binary-path == '' && inputs.source != ''
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: ${{ inputs.rust-toolchain }}

    - name: Cache cargo (source build)
      if: inputs.binary-path == '' && inputs.source != ''
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          ${{ inputs.source }}/target
        key: ${{ runner.os }}-cargo-source-${{ hashFiles(format('{0}/Cargo.lock', inputs.source)) }}
        restore-keys: ${{ runner.os }}-cargo-source-

    - name: Build from source
      id: source-build
      if: inputs.binary-path == '' && inputs.source != ''
      shell: bash
      env:
        SOURCE_PATH: ${{ inputs.source }}
      run: bash ${{ github.action_path }}/scripts/setup/build-source-homeboy.sh

    - name: Resolve Homeboy version
      id: resolve-version
      if: inputs.binary-path == '' && (inputs.source == '' || steps.source-build.outputs.built != 'true')
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        HOMEBOY_VERSION: ${{ inputs.version }}
      run: bash ${{ github.action_path }}/scripts/setup/resolve-homeboy-version.sh

    - name: Cache Homeboy
      id: cache-homeboy
      if: inputs.binary-path == '' && (inputs.source == '' || steps.source-build.outputs.built != 'true')
      uses: actions/cache@v4
      with:
        path: |
          /usr/local/bin/homeboy
          ~/.config/homeboy/extensions/
        key: homeboy-${{ steps.resolve-version.outputs.resolved-version }}-${{ inputs.extension }}-${{ runner.os }}-${{ runner.arch }}

    - name: Install Homeboy
      if: inputs.binary-path == '' && (inputs.source == '' || steps.source-build.outputs.built != 'true') && steps.cache-homeboy.outputs.cache-hit != 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        HOMEBOY_VERSION: ${{ steps.resolve-version.outputs.resolved-version }}
      run: bash ${{ github.action_path }}/scripts/setup/install-homeboy-release.sh

    - name: Resolve binary source
      id: resolve-binary
      shell: bash
      env:
        HAS_BINARY_PATH_INPUT: ${{ inputs.binary-path }}
        HAS_SOURCE_INPUT: ${{ inputs.source }}
        SOURCE_BUILT: ${{ steps.source-build.outputs.built }}
      run: bash ${{ github.action_path }}/scripts/setup/resolve-binary-source.sh

    - name: Install extension
      if: inputs.extension != '' && (inputs.binary-path != '' || steps.cache-homeboy.outputs.cache-hit != 'true' || steps.source-build.outputs.built == 'true')
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        EXTENSION_ID: ${{ inputs.extension }}
        EXTENSION_SOURCE: ${{ inputs.extension-source }}
      run: bash ${{ github.action_path }}/scripts/setup/install-extension.sh

    - name: Capture tooling metadata
      shell: bash
      env:
        EXTENSION_ID: ${{ inputs.extension }}
        EXTENSION_SOURCE: ${{ inputs.extension-source }}
        ACTION_REF: ${{ github.action_ref }}
        ACTION_REPOSITORY: ${{ github.action_repository }}
      run: bash ${{ github.action_path }}/scripts/setup/capture-tooling-metadata.sh

    - name: Verify portable config
      shell: bash
      run: bash ${{ github.action_path }}/scripts/setup/verify-portable-config.sh

    - name: Resolve execution scope
      id: resolve-scope
      shell: bash
      env:
        BASE_SHA: ${{ github.event.pull_request.base.sha }}
        SCOPE_INPUT: ${{ inputs.scope }}
        PR_HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
      run: bash ${{ github.action_path }}/scripts/scope/resolve.sh

    - name: Run Homeboy commands
      id: run-commands
      continue-on-error: true
      shell: bash
      env:
        COMMANDS: ${{ inputs.commands }}
        COMPONENT_NAME: ${{ inputs.component }}
        EXTRA_ARGS: ${{ inputs.args }}
        RUN_GROUP_PREFIX: homeboy
      run: bash ${{ github.action_path }}/scripts/core/run-homeboy-commands.sh

    - name: Apply autofix commit
      id: autofix-commit
      if: always() && github.event_name == 'pull_request' && inputs.autofix == 'true' && steps.run-commands.outputs.results != '' && (inputs.autofix-mode == 'always' || contains(steps.run-commands.outputs.results, '"fail"'))
      shell: bash
      env:
        COMMANDS: ${{ inputs.commands }}
        COMPONENT_NAME: ${{ inputs.component }}
        EXTRA_ARGS: ${{ inputs.args }}
        AUTOFIX_COMMANDS: ${{ inputs.autofix-commands }}
        AUTOFIX_LABEL: ${{ inputs.autofix-label }}
        AUTOFIX_MAX_COMMITS: ${{ inputs.autofix-max-commits }}
        AUTOFIX_MODE: ${{ inputs.autofix-mode }}
        PR_LABELS_JSON: ${{ toJson(github.event.pull_request.labels.*.name) }}
        PR_HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
        APP_TOKEN: ${{ inputs.app-token }}
      run: bash ${{ github.action_path }}/scripts/autofix/apply-autofix-commit.sh

    - name: Prepare non-PR autofix branch
      id: autofix-prepare-nonpr
      if: always() && github.event_name != 'pull_request' && inputs.autofix == 'true' && inputs.autofix-open-pr == 'true' && steps.run-commands.outputs.results != '' && (inputs.autofix-mode == 'always' || contains(steps.run-commands.outputs.results, '"fail"'))
      shell: bash
      env:
        COMMANDS: ${{ inputs.commands }}
        COMPONENT_NAME: ${{ inputs.component }}
        EXTRA_ARGS: ${{ inputs.args }}
        AUTOFIX_COMMANDS: ${{ inputs.autofix-commands }}
        AUTOFIX_MAX_COMMITS: ${{ inputs.autofix-max-commits }}
        APP_TOKEN: ${{ inputs.app-token }}
      run: bash ${{ github.action_path }}/scripts/autofix/prepare-autofix-branch.sh

    - name: Re-run Homeboy commands after autofix
      id: rerun-commands
      continue-on-error: true
      if: (github.event_name == 'pull_request' && steps.autofix-commit.outputs.committed == 'true') || (github.event_name != 'pull_request' && steps.autofix-prepare-nonpr.outputs.committed == 'true')
      shell: bash
      env:
        COMMANDS: ${{ inputs.commands }}
        COMPONENT_NAME: ${{ inputs.component }}
        EXTRA_ARGS: ${{ inputs.args }}
        RUN_GROUP_PREFIX: homeboy rerun
      run: bash ${{ github.action_path }}/scripts/core/run-homeboy-commands.sh

    - name: Open non-PR autofix PR
      id: autofix-open-pr
      if: github.event_name != 'pull_request' && steps.autofix-prepare-nonpr.outputs.committed == 'true' && steps.rerun-commands.outputs.results != '' && !contains(steps.rerun-commands.outputs.results, '"fail"')
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.app-token || github.token }}
        COMPONENT_NAME: ${{ inputs.component }}
        AUTOFIX_BRANCH: ${{ steps.autofix-prepare-nonpr.outputs.autofix-branch }}
        RESULTS: ${{ steps.rerun-commands.outputs.results }}
        AUTOFIX_FILE_COUNT: ${{ steps.autofix-prepare-nonpr.outputs.autofix-file-count }}
        AUTOFIX_FIX_TYPES: ${{ steps.autofix-prepare-nonpr.outputs.autofix-fix-types }}
      run: bash ${{ github.action_path }}/scripts/autofix/open-autofix-pr.sh

    - name: Select final results
      id: select-results
      if: always()
      shell: bash
      env:
        FIRST_RESULTS: ${{ steps.run-commands.outputs.results }}
        RERUN_RESULTS: ${{ steps.rerun-commands.outputs.results }}
      run: bash ${{ github.action_path }}/scripts/core/select-final-results.sh

    - name: Generate failure digest
      if: always() && steps.select-results.outputs.results != '' && contains(steps.select-results.outputs.results, '"fail"')
      shell: bash
      env:
        RESULTS: ${{ steps.select-results.outputs.results }}
        COMMANDS: ${{ inputs.commands }}
        AUTOFIX_ENABLED: ${{ inputs.autofix }}
        AUTOFIX_ATTEMPTED: ${{ steps.autofix-commit.outputs.committed == 'true' || steps.autofix-prepare-nonpr.outputs.committed == 'true' }}
        AUTOFIX_COMMANDS: ${{ inputs.autofix-commands }}
      run: bash ${{ github.action_path }}/scripts/digest/generate-failure-digest.sh

    - name: Enforce final status
      id: enforce-status
      if: always()
      shell: bash
      env:
        RESULTS: ${{ steps.select-results.outputs.results }}
        COMMANDS: ${{ inputs.commands }}
      run: bash ${{ github.action_path }}/scripts/core/enforce-final-status.sh

    - name: Run release
      id: release
      if: contains(inputs.commands, 'release') && github.event_name != 'pull_request'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.app-token || github.token }}
        RELEASE_DRY_RUN: ${{ inputs.release-dry-run }}
        RELEASE_BRANCH: ${{ inputs.release-branch }}
        COMPONENT_NAME: ${{ inputs.component }}
      run: bash ${{ github.action_path }}/scripts/release/run-release.sh

    - name: Post PR comment
      if: always() && github.event_name == 'pull_request'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.app-token || github.token }}
        COMMANDS: ${{ inputs.commands }}
        COMPONENT_NAME: ${{ inputs.component }}
        RESULTS: ${{ steps.select-results.outputs.results }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        BINARY_SOURCE: ${{ steps.resolve-binary.outputs.binary-source }}
        AUTOFIX_ENABLED: ${{ inputs.autofix }}
        AUTOFIX_COMMITTED: ${{ steps.autofix-commit.outputs.committed }}
        AUTOFIX_FILE_COUNT: ${{ steps.autofix-commit.outputs.autofix-file-count }}
        AUTOFIX_FIX_TYPES: ${{ steps.autofix-commit.outputs.autofix-fix-types }}
        COMMENT_KEY_INPUT: ${{ inputs.comment-key }}
        COMMENT_SECTION_KEY_INPUT: ${{ inputs.comment-section-key }}
        COMMENT_SECTION_TITLE_INPUT: ${{ inputs.comment-section-title }}
      run: bash ${{ github.action_path }}/scripts/pr/post-pr-comment.sh

    - name: Auto-file categorized audit issues
      id: categorized-issues
      if: always() && inputs.auto-issue == 'true' && github.event_name != 'pull_request' && steps.select-results.outputs.results != '' && contains(inputs.commands, 'audit') && steps.autofix-open-pr.outputs.created != 'true'
      continue-on-error: true
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.app-token || github.token }}
        RESULTS: ${{ steps.select-results.outputs.results }}
        COMMANDS: ${{ inputs.commands }}
        COMPONENT_NAME: ${{ inputs.component }}
        BINARY_SOURCE: ${{ steps.resolve-binary.outputs.binary-source }}
        AUTOFIX_ATTEMPTED: ${{ steps.autofix-prepare-nonpr.outputs.committed }}
        AUTOFIX_PR_CREATED: ${{ steps.autofix-open-pr.outputs.created }}
      run: bash ${{ github.action_path }}/scripts/issues/auto-file-categorized-issues.sh

    - name: Auto-file issue on failure
      if: always() && inputs.auto-issue == 'true' && github.event_name != 'pull_request' && steps.select-results.outputs.results != '' && contains(steps.select-results.outputs.results, '"fail"') && steps.autofix-open-pr.outputs.created != 'true' && steps.categorized-issues.outcome != 'success'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.app-token || github.token }}
        RESULTS: ${{ steps.select-results.outputs.results }}
        COMMANDS: ${{ inputs.commands }}
        COMPONENT_NAME: ${{ inputs.component }}
        BINARY_SOURCE: ${{ steps.resolve-binary.outputs.binary-source }}
        AUTOFIX_ATTEMPTED: ${{ steps.autofix-prepare-nonpr.outputs.committed }}
        AUTOFIX_PR_CREATED: ${{ steps.autofix-open-pr.outputs.created }}
      run: bash ${{ github.action_path }}/scripts/issues/auto-file-issue.sh
